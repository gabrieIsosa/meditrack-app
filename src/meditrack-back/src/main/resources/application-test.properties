spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:test}
cloudinary.api_key=${CLOUDINARY_API_KEY:test}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:test}

jwt.secret=${JWT_SECRET:test-secret-key-for-testing-only-32chars}
jwt.expiration=${JWT_EXPIRATION:3600000}